# ============================================================
# Taljoe Bank — Docker Compose
# Usage:
#   Production:  docker compose up -d
#   Dev (live):  docker compose -f docker-compose.yml -f docker-compose.dev.yml up
# ============================================================

version: '3.9'

services:
  taljoe-bank:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: taljoe-bank
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    # Optional: if you add nginx in front
    # networks:
    #   - web

# networks:
#   web:
#     external: true