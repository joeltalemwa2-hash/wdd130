<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>You're Offline — MarketHub UG</title>
  <link rel="manifest" href="manifest.json" />
  <style>
    :root { --gold:#E8A020; --green:#1A7A3F; --ink:#1A1A1A; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #FAFAF8; color: var(--ink); display: flex; flex-direction: column; min-height: 100vh; }
    header { background: #fff; border-bottom: 1px solid #eee; padding: 14px 20px; display: flex; align-items: center; gap: 10px; }
    .logo-text { display: flex; flex-direction: column; line-height: 1.1; }
    .logo-name { font-weight: 800; font-size: 1.15rem; }
    .logo-country { font-size: 0.65rem; font-weight: 700; color: var(--gold); letter-spacing: 0.08em; }
    main { flex: 1; display: flex; align-items: center; justify-content: center; padding: 40px 20px; }
    .card { text-align: center; max-width: 480px; background: #fff; border-radius: 16px; padding: 48px 32px; box-shadow: 0 4px 24px rgba(0,0,0,0.08); }
    .icon { font-size: 4rem; margin-bottom: 20px; }
    h1 { font-size: 1.8rem; font-weight: 800; margin-bottom: 12px; }
    p { color: #777; line-height: 1.7; margin-bottom: 8px; }
    .badge { display: inline-block; background: #FFF3DC; color: #B8860B; border: 1px solid #f0dfa0; padding: 6px 16px; border-radius: 50px; font-size: 0.82rem; font-weight: 600; margin-bottom: 28px; }
    .btn { display: inline-block; background: var(--gold); color: #fff; padding: 12px 28px; border-radius: 10px; font-weight: 700; font-size: 0.95rem; cursor: pointer; border: none; margin: 6px; transition: 0.2s; }
    .btn:hover { background: #C47D0A; }
    .btn-ghost { background: transparent; color: var(--ink); border: 1.5px solid #ddd; }
    .btn-ghost:hover { background: #f5f5f3; border-color: var(--gold); }
    .cached-pages { margin-top: 28px; text-align: left; background: #f9f9f7; border-radius: 10px; padding: 18px; }
    .cached-pages h4 { font-size: 0.85rem; color: #777; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 12px; }
    .cached-link { display: block; padding: 8px 0; border-bottom: 1px solid #eee; font-size: 0.9rem; color: var(--green); text-decoration: none; }
    .cached-link:last-child { border-bottom: none; }
    .cached-link:hover { color: var(--gold); }
    #status { margin-top: 16px; font-size: 0.85rem; }
    .online { color: var(--green); }
    .offline { color: #E53E3E; }
  </style>
</head>
<body>
<header>
  <svg width="36" height="36" viewBox="0 0 36 36" fill="none"><rect width="36" height="36" rx="10" fill="#E8A020"/><path d="M8 10h3l4 10 4-7 4 7 4-10h3" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/><circle cx="18" cy="27" r="3" fill="#fff"/></svg>
  <div class="logo-text"><span class="logo-name">MarketHub</span><span class="logo-country">UG</span></div>
</header>

<main>
  <div class="card">
    <div class="icon">📶</div>
    <div class="badge">No Internet Connection</div>
    <h1>You're Offline</h1>
    <p>It looks like your internet connection is unavailable right now. Don't worry — your cart is saved and we'll sync everything once you're back online.</p>

    <div id="status"></div>

    <div style="margin-top: 24px;">
      <button class="btn" onclick="tryReload()">↻ Try Again</button>
      <button class="btn btn-ghost" onclick="window.history.back()">← Go Back</button>
    </div>

    <div class="cached-pages">
      <h4>📦 Available Offline</h4>
      <a class="cached-link" href="/index.html">🏠 Home</a>
      <a class="cached-link" href="/pages/products.html">🛍️ Shop Products</a>
      <a class="cached-link" href="/pages/cart.html">🛒 Your Cart</a>
      <a class="cached-link" href="/pages/account.html">👤 My Orders</a>
      <a class="cached-link" href="/pages/vendors.html">🏪 Vendors</a>
    </div>
  </div>
</main>

<script>
  function updateStatus() {
    const el = document.getElementById('status');
    if (navigator.onLine) {
      el.innerHTML = '<span class="online">✓ You are back online!</span>';
      setTimeout(() => location.reload(), 1500);
    } else {
      el.innerHTML = '<span class="offline">✗ Still offline</span>';
    }
  }
  function tryReload() { updateStatus(); if (navigator.onLine) location.reload(); }
  window.addEventListener('online', () => { updateStatus(); });
  window.addEventListener('offline', updateStatus);
  updateStatus();
</script>
</body>
</html>
